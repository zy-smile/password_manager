name: password_manager
description: A secure local password manager app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  encrypt: ^5.0.3
  crypto: ^3.0.3
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  cupertino_icons: ^1.0.8
  flutter_slidable: ^3.1.1
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true